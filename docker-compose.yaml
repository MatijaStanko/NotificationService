services:
  db:
    image: postgres:16
    container_name: notification_service_db
    restart: always

    environment:
      POSTGRES_DB:  notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: