services:
  db:
    image: postgres:16
    container_name: notification_service_db
    restart: always

    environment:
      POSTGRES_DB:  notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: notification_service_app
    restart: always
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data: